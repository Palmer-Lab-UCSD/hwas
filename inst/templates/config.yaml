# Configuration of HWAS run
#
# Most of these fields are occupied programmatically.  
# However, there could exist errors.  To account for
# possible errors, the config file is separated into three
# sections that users need to understand:
#
#   USER INPUT
#     These settings can not be deduced programmatically
#     with confidence and consequently is the responsibility
#     of the user to set.
#   USER CONFIRM ACCURACY 
#     These settings are likely deduced accurately, but
#     should be reviewed manually by a user.
#   COMPUTER GENERATED
#     These settings are programmatically set and should
#     not be modified by users.  They are assumptions of
#     the software that need to be maintained.
#
###########################################################
## USER INPUT
###########################################################
#
# Supported types are:
#   - float,
#   - character
#
# Supported normalization methods are:
#   - quantile_normal
#   - zscore
#
phenotype: 
  name: 
  type:
  norm:

covariates:
  - name: 
    type: 
    norm:

###########################################################
## USER CONFIRM ACCURACY
###########################################################
# 
# Example
#
# Directory strucure
#
# /path/to/my/data
#             |--- samples_include
#             |--- chr1_imputation/
#             |    |--- bad_snps.tsv
#             |    |--- sample_genos.bcf
#             |    |--- sample_genos.bcf.csi
#             |    |--- misc_non_used_files.txt
#             |--- chr2_imputation/
#                  |--- bad_snps.tsv
#                  |--- sample_genos.bcf
#                  |--- sample_genos.bcf.csi
#                  |--- misc_non_used_files.txt
#
#
# Corresponding config
#
#   genotypes:
#     dir: /path/to/my/data
#     samples: 
#       filename: samples_include
#       exclusion: true
#     chrom:
#       - name: chr1
#         dir: chr1_imputation
#         pos: 
#           filename: bad_snps.tsv
#           exclusion: FALSE
#         bcf: sample_genos.bcf
#         index: sample_genos.bcf.csi
#       - name: chr2
#         dir: chr2_imputation
#         pos: 
#           filename: bad_snps.tsv
#           exlusion: FALSE
#         bcf: sample_genos.bcf
#         index: sample_genos.bcf.csi
#

genotypes:
  dir:
  samples:
    filename:
    exlusion:
  chrom:


###########################################################
## COMPUTER GENERATED
###########################################################
# Do not edit these settings
#
setup:
  rootdir: 
  subdirs:
    - .scripts
    - preprocess_data
    - postprocess_data:
        rootdir:
        subdirs:
          - pos
    - results:
        rootdir: results
        subdirs:
          - grms
          - lod
          - blup

trait:
  raw: 
    dir: preprocessed_data
    na_string: [NA, \N]
    sample_name_col:
  processed:
    dir: processed_data
    sample_file: samples
    covariate_file: covariates.tsv
    phenotype_file: 

